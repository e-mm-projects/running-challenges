<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail výzvy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="telo-stranky"> <button id="zpet-btn" class="tlacitko-zpet">Zpět na nástěnku</button>

    <h1 id="hlavni-nadpis">Načítání výzvy...</h1>

    <div class="statistiky">
        <div class="stat-box">Naběháno:<br><strong id="nabehano-text">0</strong> km</div>
        <div class="stat-box">Zbývá:<br><strong id="zbyva-text">0</strong> km</div>
        <div class="stat-box">Hotovo:<br><strong id="procenta-text">0</strong> %</div>
    </div>

    <div class="progress-bar-obal">
        <div id="progress-bar-vypln"></div>
    </div>

    <div class="zadavani-bloku">
        <p>Zadej dnešní kilometry:</p>
        <input type="number" id="nove-km" min="0.1" step="0.1" placeholder="Např. 5.5">
        <div class="tlacitka-skupina">
            <button id="pridat-km-btn">Přidat kilometry</button>
            <button id="odebrat-km-btn" class="cervene-tlacitko">Smazat kilometry</button>
        </div>
    </div>

    <div id="wow-level-kontejner" style="display: none;">
            <div class="wow-level-text">Level <span id="wow-aktualni-level">1</span></div>
            <div class="wow-xp-bar-obal">
                <div id="wow-xp-bar-vypln"></div>
            </div>
            <div class="wow-xp-info">Do dalšího levelu chybí: <span id="wow-xp-zbytek">2.0</span> km</div>
    </div>

    <div id="posledni-beh-info" class="posledni-beh-box" style="display: none;">
        🕒 Poslední záznam: <strong id="posledni-datum">--</strong> (<strong id="posledni-km">0</strong> km)
    </div>

    <div class="hlavni-obal-mapy">
        <div class="zoom-okno" id="zoom-okno-obal">
            <div class="mapa-kontejner" id="mapa-zoomovana">
                <img id="mapa-obrazek" src="" alt="Mapa" class="mapa-obrazek">

                <svg id="svg-mapa" viewBox="0 0 100 100"> <path id="trasa-krivka" d="" fill="none" stroke="#ffeb3b" stroke-width="5" stroke-dasharray="10,10" />
                </svg>
        
                <div id="panacek">
                    </div>
                <div id="body-na-mape"></div>
            </div>
        </div>

        <div class="zoom-ovladani" id="zoom-ovladani" style="display: none;">
            <button id="zoom-in-btn">➕ Přiblížit</button>
            <button id="zoom-out-btn">➖ Oddálit</button>
        </div>
    </div>

    <div class="navstivena-mista">
        <h2>Tvůj cestovatelský deník (Dosažená místa):</h2>
        <div id="seznam-zajimavosti" class="zajimavosti-mrizka"></div>
    </div>

    <p id="jmeno-zobrazeni"></p>

    <div id="gratulace-modal" class="modal-skryty">
        <div class="modal-obsah">
            <span class="zavrit-btn" id="zavrit-modal">&times;</span>
            <h2 id="modal-nadpis">Gratulujeme!</h2>
            <img id="modal-obrazek" src="" alt="Obrázek místa">
            <p id="modal-text">Tady bude text o místě...</p>
        </div>
    </div>

    <script src="data-vyzev.js"></script>
    <script src="detail-vyzvy.js"></script>
</body>
</html>
