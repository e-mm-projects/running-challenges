<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Běžecké výzvy - Přihlášení</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="pozadi-index">

    <div class="uvodni-obal">
        
        <h1 class="uvodni-nadpis">A na jakou cestu se vydáš ty?</h1>
        <p class="uvodni-popis">Stačí se přihlásit a můžeš si své nachozené, naběhané, nebo klidně na kole najeté kilometry ukládat na jakoukoli z výzev, které jsou pro tebe připraveny.</p>

        <form class="prihlasovaci-okno" onsubmit="prihlasit(event)">
            <input type="text" id="jmeno" name="jmeno" placeholder="Zadej své jméno..." autocomplete="nickname">
            <br>
            <button type="submit">Začít dobrodružství</button>
        </form>

    </div>

    <script src="script.js"></script>

</body>
</html>
